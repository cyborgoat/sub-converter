name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Configure converter origin for build
        run: |
          set -e
          if [ -n "${VITE_CONVERTER_ORIGIN_VAR}" ]; then
            echo "VITE_CONVERTER_ORIGIN=${VITE_CONVERTER_ORIGIN_VAR}" >> "$GITHUB_ENV"
          else
            OWNER="${{ github.repository_owner }}"
            REPO="${{ github.event.repository.name }}"
            if [ "$REPO" = "${OWNER}.github.io" ]; then
              echo "VITE_CONVERTER_ORIGIN=https://${OWNER}.github.io" >> "$GITHUB_ENV"
            else
              echo "VITE_CONVERTER_ORIGIN=https://${OWNER}.github.io/${REPO}" >> "$GITHUB_ENV"
            fi
          fi
        env:
          VITE_CONVERTER_ORIGIN_VAR: ${{ vars.VITE_CONVERTER_ORIGIN }}

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
