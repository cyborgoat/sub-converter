# Requires: Settings → Pages → Build and deployment → Source: GitHub Actions
# https://docs.github.com/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "25"
          cache: npm

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install
        run: npm ci

      - name: Configure build environment
        run: |
          set -e
          BASE_PATH="${{ steps.pages.outputs.base_path }}"
          if [ -n "$BASE_PATH" ]; then
            echo "VITE_BASE=${BASE_PATH}/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE=/" >> "$GITHUB_ENV"
          fi

          if [ -n "${VITE_CONVERTER_ORIGIN_VAR}" ]; then
            echo "VITE_CONVERTER_ORIGIN=${VITE_CONVERTER_ORIGIN_VAR}" >> "$GITHUB_ENV"
          else
            echo "VITE_CONVERTER_ORIGIN=${{ steps.pages.outputs.base_url }}" >> "$GITHUB_ENV"
          fi
        env:
          VITE_CONVERTER_ORIGIN_VAR: ${{ vars.VITE_CONVERTER_ORIGIN }}

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
